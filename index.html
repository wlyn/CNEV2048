    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #fff;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00d4ff, #00ff88, #ffaa00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
        }

        .header p {
            color: #888;
            font-size: 0.9rem;
        }

        .score-container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .score-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 15px 30px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .score-box .label {
            font-size: 0.8rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .score-box .value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #00d4ff;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 100px);
            grid-template-rows: repeat(4, 100px);
            gap: 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 10px;
        }

        .cell {
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            transition: all 0.15s ease;
            position: relative;
            overflow: hidden;
        }

        .cell.has-tile {
            transform: scale(1);
            animation: pop 0.2s ease;
        }

        @keyframes pop {
            0% { transform: scale(0); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        @keyframes merge {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .cell.merged {
            animation: merge 0.3s ease;
        }

        .cell .logo {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 10px;
            padding: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .cell .logo img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .cell .brand-name {
            font-size: 0.6rem;
            margin-top: 4px;
            text-align: center;
            color: rgba(255, 255, 255, 0.95);
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
            font-weight: 600;
        }

        /* 品牌颜色主题 */
        .cell[data-value="2"] { background: linear-gradient(135deg, #2d3748 0%, #1a202c 100%); } /* 极氪 */
        .cell[data-value="4"] { background: linear-gradient(135deg, #ff6700 0%, #cc5200 100%); } /* 小米 */
        .cell[data-value="8"] { background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%); } /* 零跑 */
        .cell[data-value="16"] { background: linear-gradient(135deg, #0066ff 0%, #0044cc 100%); } /* 蔚来 */
        .cell[data-value="32"] { background: linear-gradient(135deg, #10b981 0%, #059669 100%); } /* 小鹏 */
        .cell[data-value="64"] { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); } /* 理想 */
        .cell[data-value="128"] { background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%); } /* 埃安 */
        .cell[data-value="256"] { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); } /* 五菱 */
        .cell[data-value="512"] { background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%); } /* 长安 */
        .cell[data-value="1024"] { background: linear-gradient(135deg, #1e3a5f 0%, #0f2744 100%); } /* 吉利 */
        .cell[data-value="2048"] { background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%); } /* 比亚迪 */

        .controls {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .btn {
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #00ff88);
            color: #1a1a2e;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .legend {
            margin-top: 30px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            max-width: 460px;
        }

        .legend h3 {
            text-align: center;
            margin-bottom: 15px;
            color: #00d4ff;
            font-size: 1rem;
        }

        .legend-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .legend-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
        }

        .legend-item .legend-logo {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 8px;
            padding: 4px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .legend-item .legend-logo img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .legend-item .name {
            font-size: 0.65rem;
            color: #ccc;
            text-align: center;
        }

        .legend-item .rank {
            font-size: 0.6rem;
            color: #666;
        }

        .game-over-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .game-over-modal {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .game-over-modal h2 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .game-over-modal.win h2 {
            color: #00ff88;
        }

        .game-over-modal.lose h2 {
            color: #ff6b6b;
        }

        .game-over-modal p {
            color: #888;
            margin-bottom: 20px;
        }

        .game-over-modal .final-score {
            font-size: 3rem;
            font-weight: bold;
            color: #00d4ff;
            margin-bottom: 20px;
        }

        .instructions {
            margin-top: 20px;
            text-align: center;
            color: #666;
            font-size: 0.85rem;
        }

        .instructions kbd {
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 10px;
            border-radius: 5px;
            margin: 0 3px;
        }

        @media (max-width: 500px) {
            .grid {
                grid-template-columns: repeat(4, 75px);
                grid-template-rows: repeat(4, 75px);
                gap: 8px;
            }
            
            .cell {
                width: 75px;
                height: 75px;
            }
            
            .cell .logo {
                width: 45px;
                height: 45px;
                padding: 4px;
            }
            
            .cell .brand-name {
                font-size: 0.5rem;
            }
            
            .header h1 {
                font-size: 1.8rem;
            }
            
            .legend-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* 音效按钮 */
        .sound-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
            z-index: 100;
            transition: all 0.3s ease;
        }
        .sound-toggle:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }
        .sound-toggle.muted {
            opacity: 0.5;
        }

        /* 分享按钮 */
        .share-btn {
            background: linear-gradient(135deg, #ff6b6b, #ffa500);
            color: white;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .share-btn:hover {
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.4);
        }

        /* 排行榜样式 */
        .leaderboard {
            margin-top: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            max-width: 460px;
            display: none;
        }
        .leaderboard h3 {
            text-align: center;
            margin-bottom: 15px;
            color: #ffd700;
            font-size: 1rem;
        }
        .leaderboard-list {
            list-style: none;
        }
        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            margin-bottom: 8px;
        }
        .leaderboard-item:first-child {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(255, 215, 0, 0.1));
            border: 1px solid rgba(255, 215, 0, 0.3);
        }
        .leaderboard-item:nth-child(2) {
            background: linear-gradient(135deg, rgba(192, 192, 192, 0.2), rgba(192, 192, 192, 0.1));
        }
        .leaderboard-item:nth-child(3) {
            background: linear-gradient(135deg, rgba(205, 127, 50, 0.2), rgba(205, 127, 50, 0.1));
        }
        .leaderboard-rank {
            font-weight: bold;
            color: #ffd700;
            width: 30px;
        }
        .leaderboard-name {
            flex: 1;
            margin-left: 10px;
            color: #fff;
        }
        .leaderboard-score {
            font-weight: bold;
            color: #00d4ff;
        }

        /* 分享模态框 */
        .share-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1001;
        }
        .share-modal {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 350px;
            width: 90%;
        }
        .share-modal h3 {
            color: #00d4ff;
            margin-bottom: 20px;
        }
        .share-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        .share-buttons button {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: transform 0.2s;
        }
        .share-buttons button:hover {
            transform: scale(1.05);
        }
        .share-weixin { background: #07c160; color: white; }
        .share-weibo { background: #e6162d; color: white; }
        .share-copy { background: #6c757d; color: white; }
        .share-close {
            background: rgba(255, 255, 255, 0.1);
            color: #888;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 30px;
            border-radius: 8px;
            cursor: pointer;
        }

        /* 方块滑动动画增强 */
        .cell {
            transition: transform 0.12s ease-out, background 0.15s ease;
        }
        .cell.sliding {
            z-index: 10;
        }
        @keyframes slideIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .cell.new-tile {
            animation: slideIn 0.15s ease-out;
        }
    </style>
</head>
<body>

    <!-- 音效开关 -->
    <button class="sound-toggle" id="sound-toggle" onclick="toggleSound()" title="开关音效">🔊</button>

    <div class="header">
        <h1>🚗 新能源汽车 2048</h1>
        <p>合并相同品牌，冲击销量冠军比亚迪！</p>
    </div>

    <div class="score-container">
        <div class="score-box">
            <div class="label">当前分数</div>
            <div class="value" id="score">0</div>
        </div>
        <div class="score-box">
            <div class="label">最高分数</div>
            <div class="value" id="best">0</div>
        </div>
    </div>

    <div class="game-container">
        <div class="grid" id="grid"></div>
    </div>

    <div class="controls">
        <button class="btn btn-primary" onclick="newGame()">新游戏</button>
        <button class="btn btn-secondary" onclick="showLegend()">品牌图鉴</button>
        <button class="btn btn-secondary" onclick="showLeaderboard()">🏆 排行榜</button>
        <button class="btn share-btn" onclick="showShareModal()">📤 分享</button>
    </div>

    <div class="instructions">
        使用 <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> 或 <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> 移动方块，支持触屏滑动
    </div>

    <div class="legend" id="legend" style="display: none;">
        <h3>🏆 品牌销量排行（2025年数据）</h3>
        <div class="legend-grid" id="legend-grid"></div>
    </div>

    <div class="game-over-overlay" id="game-over">
        <div class="game-over-modal" id="game-over-modal">
            <h2 id="game-over-title">游戏结束</h2>
            <p id="game-over-message">再接再厉！</p>
            <div class="final-score" id="final-score">0</div>
            <button class="btn btn-primary" onclick="newGame()">再来一局</button>
        </div>
    </div>

    <div class="leaderboard" id="leaderboard">
        <h3>🏆 本地排行榜</h3>
        <ul class="leaderboard-list" id="leaderboard-list"></ul>
    </div>

    <div class="share-modal-overlay" id="share-modal">
        <div class="share-modal">
            <h3>📤 分享你的成绩</h3>
            <p style="color: #888; margin-bottom: 15px;">我在新能源汽车2048获得了 <span id="share-score" style="color: #00d4ff; font-weight: bold;">0</span> 分！</p>
            <div class="share-buttons">

                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = `cell-${i}`;
                gridEl.appendChild(cell);
            }
        }

        function newGame() {
            grid = Array(16).fill(0);
            score = 0;
            gameOver = false;
            won = false;
            document.getElementById('score').textContent = '0';
            document.getElementById('game-over').style.display = 'none';
            
            addRandomTile();
            addRandomTile();
            render();
        }

        function addRandomTile() {
            const emptyCells = [];
            for (let i = 0; i < 16; i++) {
                if (grid[i] === 0) emptyCells.push(i);
            }
            if (emptyCells.length === 0) return;
            
            const randomIndex = emptyCells[Math.floor(Math.random() * emptyCells.length)];
            grid[randomIndex] = Math.random() < 0.9 ? 2 : 4;
        }

        function render() {
            for (let i = 0; i < 16; i++) {
                const cell = document.getElementById(`cell-${i}`);
                const value = grid[i];
                
                cell.innerHTML = '';
                cell.className = 'cell';
                cell.removeAttribute('data-value');
                
                if (value > 0) {
                    cell.classList.add('has-tile');
                    cell.setAttribute('data-value', value);
                    
                    const brand = BRANDS[value];
                    
                    if (brand) {
                        const logoDiv = document.createElement('div');
                        logoDiv.className = 'logo';
                        
                        const img = document.createElement('img');
                        img.src = brand.logo;
                        img.alt = brand.name;
                        img.onerror = function() {
                            // 如果图片加载失败，显示品牌名
                            this.style.display = 'none';
                            this.parentElement.innerHTML = `<span style="font-size:12px;color:#333;">${brand.name}</span>`;
                        };
                        logoDiv.appendChild(img);
                        cell.appendChild(logoDiv);
                        
                        const nameEl = document.createElement('div');
                        nameEl.className = 'brand-name';
                        nameEl.textContent = brand.name;
                        cell.appendChild(nameEl);
                    } else {
                        // 超过2048的情况
                        const logoDiv = document.createElement('div');
                        logoDiv.className = 'logo';
                        logoDiv.innerHTML = `<span style="font-size:16px;font-weight:bold;color:#333;">${value}</span>`;
                        cell.appendChild(logoDiv);
                    }
                }
            }
        }

        function move(direction) {
            if (gameOver) return;
            
            let moved = false;
            const mergedCells = [];
            
            function getLine(index) {
                const line = [];
                for (let i = 0; i < 4; i++) {
                    switch(direction) {
                        case 'left': line.push(index * 4 + i); break;
                        case 'right': line.push(index * 4 + (3 - i)); break;
                        case 'up': line.push(i * 4 + index); break;
                        case 'down': line.push((3 - i) * 4 + index); break;
                    }
                }
                return line;
            }
            
            function processLine(lineIndices) {
                const values = lineIndices.map(i => grid[i]);
                const filtered = values.filter(v => v !== 0);
                const merged = [];
                
                for (let i = 0; i < filtered.length; i++) {
                    if (i < filtered.length - 1 && filtered[i] === filtered[i + 1]) {
                        const newValue = filtered[i] * 2;
                        merged.push(newValue);
                        score += newValue;
                        
                        if (newValue === 2048 && !won) {
                            won = true;
                            setTimeout(() => showGameOver(true), 300);
                        }
                        
                        i++;
                    } else {
                        merged.push(filtered[i]);
                    }
                }
                
                while (merged.length < 4) merged.push(0);
                
                for (let i = 0; i < 4; i++) {
                    if (grid[lineIndices[i]] !== merged[i]) {
                        moved = true;
                        grid[lineIndices[i]] = merged[i];
                        if (merged[i] > 0 && values[i] !== merged[i]) {
                            mergedCells.push(lineIndices[i]);
                        }
                    }
                }
            }
            
            for (let i = 0; i < 4; i++) {
                processLine(getLine(i));
            }
            
            if (moved) {
                playSound('move');
                addRandomTile();
                render();
                
                if (mergedCells.length > 0) playSound('merge');
                mergedCells.forEach(cellIndex => {
                    const cell = document.getElementById(`cell-${cellIndex}`);
                    cell.classList.add('merged');
                    setTimeout(() => cell.classList.remove('merged'), 300);
                });
                
                document.getElementById('score').textContent = score;
                
                if (score > best) {
                    best = score;
                    localStorage.setItem('ev2048-best', best);
                    document.getElementById('best').textContent = best;
                }
                
                if (!canMove()) {
                    setTimeout(() => showGameOver(false), 500);
                }
            }
        }

        function canMove() {
            if (grid.includes(0)) return true;
            
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    const index = i * 4 + j;
                    const value = grid[index];
                    
                    if (j < 3 && grid[index + 1] === value) return true;
                    if (i < 3 && grid[index + 4] === value) return true;
                }
            }
            
            return false;
        }

        function showGameOver(isWin) {
            gameOver = true;
            saveToLeaderboard(score);
            playSound(isWin ? 'win' : 'lose');
            const overlay = document.getElementById('game-over');
            const modal = document.getElementById('game-over-modal');
            const title = document.getElementById('game-over-title');
            const message = document.getElementById('game-over-message');
            const finalScore = document.getElementById('final-score');
            
            overlay.style.display = 'flex';
            finalScore.textContent = score;
            
            if (isWin) {
                modal.className = 'game-over-modal win';
                title.textContent = '🎉 恭喜！达成比亚迪！';
                message.textContent = '你已经成为新能源汽车销量冠军！';
            } else {
                modal.className = 'game-over-modal lose';
                title.textContent = '😅 游戏结束';
                message.textContent = '没有可移动的方块了，再试一次！';
            }
        }

        function setupControls() {
            document.addEventListener('keydown', (e) => {
                switch(e.key) {
                    case 'ArrowLeft':
                    case 'a':
                    case 'A':
                        e.preventDefault();
                        move('left');
                        break;
                    case 'ArrowRight':
                    case 'd':
                    case 'D':
                        e.preventDefault();
                        move('right');
                        break;
                    case 'ArrowUp':
                    case 'w':
                    case 'W':
                        e.preventDefault();
                        move('up');
                        break;
                    case 'ArrowDown':
                    case 's':
                    case 'S':
                        e.preventDefault();
                        move('down');
                        break;
                }
            });
            
            let touchStartX, touchStartY;
            const gridEl = document.getElementById('grid');
            
            gridEl.addEventListener('touchstart', (e) => {
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            });
            
            gridEl.addEventListener('touchend', (e) => {
                if (!touchStartX || !touchStartY) return;
                
                const touchEndX = e.changedTouches[0].clientX;
                const touchEndY = e.changedTouches[0].clientY;
                
                const diffX = touchEndX - touchStartX;
                const diffY = touchEndY - touchStartY;
                
                const minSwipe = 50;
                
                if (Math.abs(diffX) > Math.abs(diffY)) {
                    if (Math.abs(diffX) > minSwipe) {
                        move(diffX > 0 ? 'right' : 'left');
                    }
                } else {
                    if (Math.abs(diffY) > minSwipe) {
                        move(diffY > 0 ? 'down' : 'up');
                    }
                }
                
                touchStartX = null;
                touchStartY = null;
            });
        }

        function showLegend() {
            const legend = document.getElementById('legend');
            const leaderboard = document.getElementById('leaderboard');
            leaderboard.style.display = 'none';
            legend.style.display = legend.style.display === 'none' ? 'block' : 'none';
        }

        function renderLegend() {
            const legendGrid = document.getElementById('legend-grid');
            const values = [2048, 1024, 512, 256, 128, 64, 32, 16, 8, 4, 2];
            const ranks = ['第1名', '第2名', '第3名', '第4名', '第5名', '第6名', '第7名', '第8名', '第9名', '第10名', '第11名'];
            
            values.forEach((value, index) => {
                const brand = BRANDS[value];
                const item = document.createElement('div');
                item.className = 'legend-item';
                item.innerHTML = `
                    <div class="legend-logo">
                        <img src="${brand.logo}" alt="${brand.name}" onerror="this.style.display='none';this.parentElement.innerHTML='<span style=font-size:10px>${brand.name}</span>'">
                    </div>
                    <div class="name">${brand.name}</div>
                    <div class="rank">${ranks[index]} (${value})</div>
                `;
                legendGrid.appendChild(item);
            });
        }


        // ===== 音效系统 =====
        let soundEnabled = localStorage.getItem('ev2048-sound') !== 'false';
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(type) {
            if (!soundEnabled) return;
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            switch(type) {
                case 'move':
                    oscillator.frequency.setValueAtTime(400, audioContext.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(300, audioContext.currentTime + 0.1);
                    gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
                    oscillator.start();
                    oscillator.stop(audioContext.currentTime + 0.1);
                    break;
                case 'merge':
                    oscillator.frequency.setValueAtTime(600, audioContext.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(800, audioContext.currentTime + 0.15);
                    gainNode.gain.setValueAtTime(0.15, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.15);
                    oscillator.start();
                    oscillator.stop(audioContext.currentTime + 0.15);
                    break;
                case 'win':
                    [0, 0.15, 0.3, 0.45].forEach((delay, i) => {
                        const osc = audioContext.createOscillator();
                        const gain = audioContext.createGain();
                        osc.connect(gain);
                        gain.connect(audioContext.destination);
                        osc.frequency.setValueAtTime([523, 659, 784, 1047][i], audioContext.currentTime + delay);
                        gain.gain.setValueAtTime(0.15, audioContext.currentTime + delay);
                        gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + delay + 0.2);
                        osc.start(audioContext.currentTime + delay);
                        osc.stop(audioContext.currentTime + delay + 0.2);
                    });
                    break;
                case 'lose':
                    oscillator.frequency.setValueAtTime(300, audioContext.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(100, audioContext.currentTime + 0.3);
                    gainNode.gain.setValueAtTime(0.15, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
                    oscillator.start();
                    oscillator.stop(audioContext.currentTime + 0.3);
                    break;
            }
        }
        
        function toggleSound() {
            soundEnabled = !soundEnabled;
            localStorage.setItem('ev2048-sound', soundEnabled);
            document.getElementById('sound-toggle').textContent = soundEnabled ? '🔊' : '🔇';
            document.getElementById('sound-toggle').classList.toggle('muted', !soundEnabled);
            if (soundEnabled) playSound('move');
        }
        
        // 初始化音效按钮状态
        document.getElementById('sound-toggle').textContent = soundEnabled ? '🔊' : '🔇';
        document.getElementById('sound-toggle').classList.toggle('muted', !soundEnabled);

        // ===== 排行榜系统 =====
        function getLeaderboard() {
            const data = localStorage.getItem('ev2048-leaderboard');
            return data ? JSON.parse(data) : [];
        }
        
        function saveToLeaderboard(score) {
            const leaderboard = getLeaderboard();
            const date = new Date().toLocaleDateString('zh-CN');
            leaderboard.push({ score, date });
            leaderboard.sort((a, b) => b.score - a.score);
            const top10 = leaderboard.slice(0, 10);
            localStorage.setItem('ev2048-leaderboard', JSON.stringify(top10));
            return top10;
        }
        
        function showLeaderboard() {
            const leaderboard = document.getElementById('leaderboard');
            const legend = document.getElementById('legend');
            legend.style.display = 'none';
            leaderboard.style.display = leaderboard.style.display === 'none' ? 'block' : 'none';
            
            if (leaderboard.style.display === 'block') {
                renderLeaderboard();
            }
        }
        
        function renderLeaderboard() {
            const list = document.getElementById('leaderboard-list');
            const data = getLeaderboard();
            list.innerHTML = '';
            
            if (data.length === 0) {
                list.innerHTML = '<li class="leaderboard-item" style="justify-content: center; color: #666;">还没有记录，开始游戏吧！</li>';
                return;
            }
            
            data.forEach((item, index) => {
                const medals = ['🥇', '🥈', '🥉'];
                const rank = index < 3 ? medals[index] : `${index + 1}`;
                const li = document.createElement('li');
                li.className = 'leaderboard-item';
                li.innerHTML = `
                    <span class="leaderboard-rank">${rank}</span>
                    <span class="leaderboard-name">${item.date}</span>
                    <span class="leaderboard-score">${item.score}</span>
                `;
                list.appendChild(li);
            });
        }

        // ===== 分享功能 =====
        function showShareModal() {
            document.getElementById('share-score').textContent = score;
            document.getElementById('share-modal').style.display = 'flex';
        }
        
        function hideShareModal() {
            document.getElementById('share-modal').style.display = 'none';
        }
        
        function shareToWeixin() {
            const text = `🚗 我在新能源汽车2048获得了 ${score} 分！从极氪到比亚迪，你能超过我吗？👉 https://cnev.wlyn.net`;
            if (navigator.share) {
                navigator.share({ title: '新能源汽车2048', text: text, url: 'https://cnev.wlyn.net' });
            } else {
                copyToClipboard(text);
                alert('分享内容已复制，请粘贴到微信分享给好友！');
            }
        }
        
        function shareToWeibo() {
            const text = encodeURIComponent(`🚗 我在新能源汽车2048获得了 ${score} 分！从极氪到比亚迪，你能超过我吗？`);
            const url = encodeURIComponent('https://cnev.wlyn.net');
            window.open(`https://service.weibo.com/share/share.php?title=${text}&url=${url}`, '_blank');
        }
        
        function copyShareLink() {
            const text = `🚗 我在新能源汽车2048获得了 ${score} 分！从极氪到比亚迪，你能超过我吗？👉 https://cnev.wlyn.net`;
            copyToClipboard(text);
            alert('分享内容已复制到剪贴板！');
        }
        
        function copyToClipboard(text) {
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text);
            } else {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
            }
        }
        
        // 点击模态框外部关闭
        document.getElementById('share-modal').addEventListener('click', function(e) {
            if (e.target === this) hideShareModal();
        });


        init();
    </script>
